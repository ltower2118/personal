<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시설 점검/유지보수 기록 관리</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --border: #e2e4e9;
    --text-main: #1f2430;
    --text-muted: #6b7280;
    --ok: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --done: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    background: var(--bg);
    color: var(--text-main);
  }
  header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
  }
  header p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 16px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 60px; }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn:hover { background: var(--primary-dark); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    width: auto;
    min-width: 140px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th { color: var(--text-muted); font-weight: 500; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-ok { background: #dcfce7; color: var(--ok); }
  .badge-warn { background: #fef3c7; color: var(--warn); }
  .badge-danger { background: #fee2e2; color: var(--danger); }
  .badge-done { background: #e5e7eb; color: var(--done); }
  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 0;
    font-size: 13px;
  }
  .row-actions button {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
  }
  .row-actions button:hover { color: var(--danger); }
  .notice {
    font-size: 12px;
    color: var(--text-muted);
    background: #fffbea;
    border: 1px solid #fde68a;
    padding: 10px 14px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>시설 점검 / 유지보수 기록 관리</h1>
  <p>내부 직원용 시설 점검 이력 관리 도구</p>
</header>

<div class="container">

  <div class="notice">
    현재 이 데이터는 <b>이 브라우저에만</b> 저장됩니다(localStorage). 여러 직원이 함께 데이터를 공유하려면
    README.md 안내에 따라 Google Sheets 연동 단계를 추가로 진행해주세요.
  </div>

  <div class="card">
    <h2>새 점검/유지보수 기록 추가</h2>
    <form id="recordForm">
      <div class="form-grid">
        <div>
          <label>시설명 / 위치</label>
          <input type="text" id="facility" placeholder="예: 3층 공조기실" required>
        </div>
        <div>
          <label>점검일자</label>
          <input type="date" id="date" required>
        </div>
        <div>
          <label>점검자</label>
          <input type="text" id="inspector" placeholder="예: 홍길동" required>
        </div>
        <div>
          <label>상태</label>
          <select id="status" required>
            <option value="정상">정상</option>
            <option value="이상발견">이상 발견</option>
            <option value="수리중">수리 중</option>
            <option value="수리완료">수리 완료</option>
          </select>
        </div>
        <div class="full">
          <label>점검 내용</label>
          <textarea id="content" placeholder="점검/조치 내용을 입력하세요"></textarea>
        </div>
        <div>
          <label>다음 점검 예정일</label>
          <input type="date" id="nextDate">
        </div>
      </div>
      <button type="submit" class="btn">기록 추가</button>
    </form>
  </div>

  <div class="card">
    <h2>기록 목록</h2>
    <div class="filter-bar">
      <select id="filterStatus">
        <option value="">전체 상태</option>
        <option value="정상">정상</option>
        <option value="이상발견">이상 발견</option>
        <option value="수리중">수리 중</option>
        <option value="수리완료">수리 완료</option>
      </select>
      <input type="text" id="searchBox" placeholder="시설명/점검자 검색">
      <button class="btn-outline" id="exportBtn">CSV 내보내기</button>
    </div>
    <div id="tableWrap">
      <table>
        <thead>
          <tr>
            <th>시설명/위치</th>
            <th>점검일자</th>
            <th>점검자</th>
            <th>상태</th>
            <th>내용</th>
            <th>다음 점검일</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none;">등록된 기록이 없습니다.</div>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'facility_records_v1';

function loadRecords() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : [];
}

function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function statusBadgeClass(status) {
  switch (status) {
    case '정상': return 'badge-ok';
    case '이상발견': return 'badge-danger';
    case '수리중': return 'badge-warn';
    case '수리완료': return 'badge-done';
    default: return '';
  }
}

function statusLabel(status) {
  const map = { '정상': '정상', '이상발견': '이상 발견', '수리중': '수리 중', '수리완료': '수리 완료' };
  return map[status] || status;
}

function render() {
  const records = loadRecords();
  const filterStatus = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchBox').value.trim().toLowerCase();

  const filtered = records.filter(r => {
    if (filterStatus && r.status !== filterStatus) return false;
    if (search && !(r.facility.toLowerCase().includes(search) || r.inspector.toLowerCase().includes(search))) return false;
    return true;
  });

  const tbody = document.getElementById('tableBody');
  const emptyMsg = document.getElementById('emptyMsg');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    emptyMsg.style.display = 'block';
  } else {
    emptyMsg.style.display = 'none';
    filtered
      .slice()
      .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
      .forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(r.facility)}</td>
          <td>${escapeHtml(r.date)}</td>
          <td>${escapeHtml(r.inspector)}</td>
          <td><span class="badge ${statusBadgeClass(r.status)}">${statusLabel(r.status)}</span></td>
          <td>${escapeHtml(r.content || '')}</td>
          <td>${escapeHtml(r.nextDate || '-')}</td>
          <td class="row-actions"><button data-id="${r.id}" class="delBtn">삭제</button></td>
        `;
        tbody.appendChild(tr);
      });
  }

  document.querySelectorAll('.delBtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      const updated = loadRecords().filter(r => String(r.id) !== String(id));
      saveRecords(updated);
      render();
    });
  });
}

function escapeHtml(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

document.getElementById('recordForm').addEventListener('submit', function (e) {
  e.preventDefault();
  const records = loadRecords();
  records.push({
    id: Date.now(),
    facility: document.getElementById('facility').value,
    date: document.getElementById('date').value,
    inspector: document.getElementById('inspector').value,
    status: document.getElementById('status').value,
    content: document.getElementById('content').value,
    nextDate: document.getElementById('nextDate').value
  });
  saveRecords(records);
  this.reset();
  render();
});

document.getElementById('filterStatus').addEventListener('change', render);
document.getElementById('searchBox').addEventListener('input', render);

document.getElementById('exportBtn').addEventListener('click', () => {
  const records = loadRecords();
  if (records.length === 0) { alert('내보낼 기록이 없습니다.'); return; }
  const headers = ['시설명/위치', '점검일자', '점검자', '상태', '내용', '다음점검일'];
  const rows = records.map(r => [r.facility, r.date, r.inspector, statusLabel(r.status), r.content, r.nextDate]);
  let csv = '\uFEFF' + headers.join(',') + '\n';
  rows.forEach(row => {
    csv += row.map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = '시설점검기록_' + new Date().toISOString().slice(0, 10) + '.csv';
  link.click();
});

render();
</script>

</body>
</html>
