<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Facility Manager</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f5f7;
}

header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    margin:10px 0;
}

.status{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:20px;
}

.status div{
    background:white;
    padding:15px;
    border-radius:10px;
}

footer{
    margin-top:30px;
    background:#1565c0;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>

<h1>🏢 Smart Facility Manager</h1>

<p>시설관리 통합시스템</p>

<div id="today"></div>

</header>

<div class="container">

<h2>📊 메인메뉴</h2>

<div class="dashboard">

<div class="card" onclick="location.href='equipment.html'">
<h3>⚡ 설비관리</h3>
<p>설비 등록 및 조회</p>
</div>

<div class="card" onclick="location.href='inspection.html'">
<h3>📝 점검일지</h3>
<p>일일 / 월간 점검</p>
</div>

<div class="card" onclick="location.href='history.html'">
<h3>🔧 고장이력</h3>
<p>고장 및 조치내역</p>
</div>

<div class="card" onclick="location.href='inventory.html'">
<h3>📦 재고관리</h3>
<p>소모품 관리</p>
</div>

<div class="card" onclick="location.href='usage.html'">
<h3>📋 사용이력</h3>
<p>사용내역 조회</p>
</div>

<div class="card" onclick="location.href='qr.html'">
<h3>📱 QR조회</h3>
<p>QR 설비관리</p>
</div>

<div class="card" onclick="location.href='manual.html'">
<h3>📚 시설매뉴얼</h3>
<p>조치방법</p>
</div>

<div class="card" onclick="location.href='report.html'">
<h3>📄 보고서</h3>
<p>자동 보고서</p>
</div>

</div>

<h2>📈 오늘 현황</h2>

<div class="status">

<div>
<h3>오늘 점검</h3>
<h1 id="check">0</h1>
</div>

<div>
<h3>고장 접수</h3>
<h1 id="fault">0</h1>
</div>

<div>
<h3>재고 부족</h3>
<h1 id="stock">0</h1>
</div>

<div>
<h3>미완료 작업</h3>
<h1 id="work">0</h1>
</div>

</div>

</div>

<footer>

Smart Facility Manager<br>

Version 1.0

</footer>

<script>

const d=new Date();

document.getElementById("today").innerHTML=
d.getFullYear()+"년 "
+(d.getMonth()+1)+"월 "
+d.getDate()+"일";

</script>

</body>

</html>
