<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설비관리</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:20px;
}

h1{
    color:#1565c0;
}

.container{
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    padding:10px 15px;
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

th{
    background:#1565c0;
    color:white;
}

.search{
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

<h1>⚡ 설비관리</h1>

<input id="name" placeholder="설비명">

<input id="location" placeholder="설치위치">

<select id="category">
<option>전기설비</option>
<option>소방설비</option>
<option>기계설비</option>
<option>CCTV</option>
<option>주차관제</option>
<option>방송설비</option>
<option>네트워크</option>
<option>승강기</option>
<option>펌프</option>
<option>정화조</option>
</select>

<select id="status">
<option>정상</option>
<option>점검중</option>
<option>고장</option>
</select>

<button onclick="addEquipment()">등록</button>

<div class="search">

<input id="search" placeholder="검색" onkeyup="loadData()">

</div>

<table>

<thead>

<tr>

<th>번호</th>

<th>설비명</th>

<th>분류</th>

<th>위치</th>

<th>상태</th>

<th>삭제</th>

</tr>

</thead>

<tbody id="list">

</tbody>

</table>

</div>

<script>

let data=JSON.parse(localStorage.getItem("equipment"))||[];

function save(){

localStorage.setItem("equipment",JSON.stringify(data));

}

function addEquipment(){

let item={

name:document.getElementById("name").value,

location:document.getElementById("location").value,

category:document.getElementById("category").value,

status:document.getElementById("status").value

};

if(item.name==""){

alert("설비명을 입력하세요");

return;

}

data.push(item);

save();

loadData();

document.getElementById("name").value="";
document.getElementById("location").value="";

}

function remove(index){

if(confirm("삭제하시겠습니까?")){

data.splice(index,1);

save();

loadData();

}

}

function loadData(){

let keyword=document.getElementById("search").value.toLowerCase();

let html="";

data.forEach((d,i)=>{

if(
d.name.toLowerCase().includes(keyword)||
d.location.toLowerCase().includes(keyword)
){

html+=`
<tr>

<td>${i+1}</td>

<td>${d.name}</td>

<td>${d.category}</td>

<td>${d.location}</td>

<td>${d.status}</td>

<td>

<button onclick="remove(${i})">

삭제

</button>

</td>

</tr>

`;

}

});

document.getElementById("list").innerHTML=html;

}

loadData();

</script>

</body>
</html>
